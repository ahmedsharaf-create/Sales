<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Shop Sales System</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDNs (Using specific versions for stability) -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX parsing in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.412.0/dist/umd/lucide.min.js"></script>
    <script src="https://unpkg.com/lucide-react@0.412.0/dist/umd/lucide-react.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, getDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Global Firebase handles
        window.FirebaseSDK = { initializeApp, getFirestore, collection, addDoc, onSnapshot, doc, setDoc, getDoc, writeBatch, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        // Fix for LucideReact in browser environment
        const { 
            PlusCircle, Store, Users, ClipboardList, Clock, 
            TrendingUp, Settings, Trash2, ChevronRight, 
            Loader2, Download, Filter, BarChart3, Target, 
            Calendar, Upload, FileSpreadsheet, AlertCircle, 
            Database, Info 
        } = window.lucideReact;

        // Configuration Handling
        let firebaseConfig = null;
        try {
            firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        } catch (e) {
            console.error("Firebase config error:", e);
        }
        
        const appId = window.__app_id || 'cash-shop-sales-v3';

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard'); 
            const [loading, setLoading] = useState(true);
            const [configMissing, setConfigMissing] = useState(!firebaseConfig || !firebaseConfig.apiKey);
            
            const [areaManagers, setAreaManagers] = useState([]);
            const [shops, setShops] = useState([]); 
            const [targets, setTargets] = useState({});
            const [salesRecords, setSalesRecords] = useState([]);
            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);

            useEffect(() => {
                if (configMissing) {
                    setLoading(false);
                    return;
                }

                const { initializeApp, getFirestore, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } = window.FirebaseSDK;
                try {
                    const app = initializeApp(firebaseConfig);
                    const firestore = getFirestore(app);
                    const authInstance = getAuth(app);
                    
                    setDb(firestore);
                    setAuth(authInstance);

                    const initAuth = async () => {
                        try {
                            if (window.__initial_auth_token) {
                                await signInWithCustomToken(authInstance, window.__initial_auth_token);
                            } else {
                                await signInAnonymously(authInstance);
                            }
                        } catch (error) {
                            console.error("Auth error:", error);
                        }
                    };

                    initAuth();
                    const unsubscribe = onAuthStateChanged(authInstance, (u) => {
                        setUser(u);
                        setLoading(false);
                    });
                    return () => unsubscribe();
                } catch (e) {
                    console.error("Firebase init failed:", e);
                    setLoading(false);
                }
            }, [configMissing]);

            useEffect(() => {
                if (!user || !db) return;

                const { doc, collection, onSnapshot } = window.FirebaseSDK;
                const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
                const unsubSettings = onSnapshot(settingsRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setAreaManagers(data.areaManagers || []);
                        setShops(data.shops || []);
                        setTargets(data.targets || {});
                    }
                });

                const salesRef = collection(db, 'artifacts', appId, 'public', 'data', 'sales');
                const unsubSales = onSnapshot(salesRef, (snapshot) => {
                    const records = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    setSalesRecords(records.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0)));
                });

                return () => { unsubSettings(); unsubSales(); };
            }, [user, db]);

            if (loading) {
                return (
                    <div className="flex h-screen items-center justify-center bg-slate-50 text-emerald-600">
                        <Loader2 className="w-12 h-12 animate-spin" />
                    </div>
                );
            }

            if (configMissing) {
                return (
                    <div className="flex flex-col h-screen items-center justify-center bg-slate-50 p-6 text-center">
                        <AlertCircle className="text-red-500 mb-4" size={48} />
                        <h1 className="text-2xl font-bold mb-2 tracking-tight">Configuration Required</h1>
                        <p className="text-slate-600 max-w-md mb-6">This application needs a Firebase config to save data. If you're on Vercel, please provide the config in your environment variables.</p>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 text-left w-full max-w-lg">
                            <p className="text-xs font-bold text-slate-400 mb-2 uppercase">Developer Help:</p>
                            <code className="text-sm text-slate-600 block bg-slate-50 p-3 rounded-lg overflow-x-auto">
                                window.__firebase_config = '{"apiKey": "...", ...}';
                            </code>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-[#F8FAFC] text-slate-900 font-sans pb-20 md:pb-0 md:pl-64">
                    <Navigation view={view} setView={setView} />
                    <main className="p-4 md:p-8 max-w-[1600px] mx-auto">
                        {view === 'dashboard' && <Dashboard records={salesRecords} targets={targets} shops={shops} managers={areaManagers} />}
                        {view === 'collection' && <SalesCollectionForm areaManagers={areaManagers} shops={shops} appId={appId} db={db} user={user} />}
                        {view === 'admin' && <AdminDashboard areaManagers={areaManagers} shops={shops} targets={targets} appId={appId} db={db} user={user} updateConfig={(m, s, t) => {
                             const { doc, setDoc } = window.FirebaseSDK;
                             setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config'), { areaManagers: m, shops: s, targets: t });
                        }} />}
                        {view === 'reports' && <SalesList records={salesRecords} targets={targets} shops={shops} managers={areaManagers} />}
                    </main>
                    <MobileNav view={view} setView={setView} />
                </div>
            );
        }

        function Navigation({ view, setView }) {
            const links = [
                { id: 'dashboard', label: 'Dashboard', icon: BarChart3 },
                { id: 'collection', label: 'Sales Entry', icon: PlusCircle },
                { id: 'reports', label: 'Reports & Export', icon: ClipboardList },
                { id: 'admin', label: 'Admin & Targets', icon: Settings },
            ];
            return (
                <nav className="hidden md:flex flex-col fixed left-0 top-0 bottom-0 w-64 bg-[#0F172A] text-slate-300 p-6 z-40">
                    <div className="mb-10 flex items-center gap-3">
                        <div className="bg-emerald-500 p-2 rounded-lg shadow-lg shadow-emerald-500/20">
                            <Store className="text-white" size={20} />
                        </div>
                        <h1 className="text-xl font-bold text-white tracking-wider">CASH SHOP</h1>
                    </div>
                    <div className="space-y-1">
                        {links.map((link) => (
                            <button key={link.id} onClick={() => setView(link.id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${view === link.id ? 'bg-emerald-600/10 text-emerald-400 border border-emerald-600/20' : 'hover:bg-slate-800'}`}>
                                <link.icon size={18} />
                                <span className="font-medium">{link.label}</span>
                            </button>
                        ))}
                    </div>
                </nav>
            );
        }

        function MobileNav({ view, setView }) {
            const icons = [
                { id: 'dashboard', icon: BarChart3 },
                { id: 'collection', icon: PlusCircle },
                { id: 'reports', icon: ClipboardList },
                { id: 'admin', icon: Settings },
            ];
            return (
                <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around p-3 md:hidden z-50">
                    {icons.map(item => (
                        <button key={item.id} onClick={() => setView(item.id)} className={`p-2 rounded-lg ${view === item.id ? 'text-emerald-600' : 'text-slate-400'}`}>
                            <item.icon size={24} />
                        </button>
                    ))}
                </div>
            );
        }

        // --- DASHBOARD ---
        function Dashboard({ records, targets, shops, managers }) {
            const [filterManager, setFilterManager] = useState('All');
            const [filterShop, setFilterShop] = useState('All');
            const [timeRange, setTimeRange] = useState('This Month');

            const filteredData = useMemo(() => {
                let data = [...records];
                if (filterManager !== 'All') data = data.filter(r => r.areaManager === filterManager);
                if (filterShop !== 'All') data = data.filter(r => r.shopName === filterShop);
                const now = new Date();
                if (timeRange === 'Today') {
                    data = data.filter(r => new Date(r.timestamp).toDateString() === now.toDateString());
                } else if (timeRange === 'This Month') {
                    data = data.filter(r => {
                        const d = new Date(r.timestamp);
                        return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                    });
                }
                return data;
            }, [records, filterManager, filterShop, timeRange]);

            const stats = useMemo(() => {
                const totalGA = filteredData.reduce((acc, curr) => acc + (curr.gaAch || 0), 0);
                const totalOC = filteredData.reduce((acc, curr) => acc + (curr.ocAch || 0), 0);
                let targetGA = 0; let targetOC = 0;
                const activeShopNames = filterShop === 'All' ? shops.filter(s => filterManager === 'All' || s.manager === filterManager).map(s => s.name) : [filterShop];
                activeShopNames.forEach(s => {
                    targetGA += Number(targets[s]?.ga || 0);
                    targetOC += Number(targets[s]?.oc || 0);
                });
                return { totalGA, totalOC, targetGA, targetOC, gaProgress: targetGA > 0 ? (totalGA / targetGA) * 100 : 0, ocProgress: targetOC > 0 ? (totalOC / targetOC) * 100 : 0 };
            }, [filteredData, targets, filterShop, filterManager, shops]);

            return (
                <div className="space-y-6">
                    <header className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div><h2 className="text-3xl font-black text-slate-800 tracking-tight">Performance Overview</h2><p className="text-slate-500">Real-time business intelligence</p></div>
                        <div className="flex flex-wrap items-center gap-3">
                            <div className="flex items-center gap-2 bg-white px-3 py-2 rounded-lg border border-slate-200 text-sm">
                                <Filter size={16} className="text-slate-400" />
                                <select value={filterManager} onChange={e => {setFilterManager(e.target.value); setFilterShop('All')}} className="bg-transparent focus:outline-none font-medium">
                                    <option value="All">All Managers</option>
                                    {managers.map(m => <option key={m} value={m}>{m}</option>)}
                                </select>
                            </div>
                            <div className="flex items-center gap-2 bg-white px-3 py-2 rounded-lg border border-slate-200 text-sm">
                                <Store size={16} className="text-slate-400" />
                                <select value={filterShop} onChange={e => setFilterShop(e.target.value)} className="bg-transparent focus:outline-none font-medium">
                                    <option value="All">All Shops</option>
                                    {shops.filter(s => filterManager === 'All' || s.manager === filterManager).map(s => <option key={s.name} value={s.name}>{s.name}</option>)}
                                </select>
                            </div>
                        </div>
                    </header>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <KPIBox title="GA Achievement" value={stats.totalGA} target={stats.targetGA} progress={stats.gaProgress} color="emerald" />
                        <KPIBox title="OC Achievement" value={stats.totalOC} target={stats.targetOC} progress={stats.ocProgress} color="blue" />
                        <KPIBox title="Total Progress" value={`${((stats.gaProgress + stats.ocProgress) / 2).toFixed(1)}%`} progress={(stats.gaProgress + stats.ocProgress) / 2} color="purple" />
                        <KPIBox title="Record Count" value={filteredData.length} color="slate" />
                    </div>
                </div>
            );
        }

        function KPIBox({ title, value, target, progress, color }) {
            const barColors = { emerald: 'bg-emerald-500', blue: 'bg-blue-500', purple: 'bg-purple-500', slate: 'bg-slate-500' };
            return (
                <div className="p-6 rounded-[2rem] bg-white border border-slate-200 shadow-sm">
                    <p className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-3">{title}</p>
                    <h4 className="text-3xl font-black text-slate-900 leading-none mb-4 whitespace-nowrap overflow-hidden text-ellipsis">
                        {typeof value === 'number' ? value.toLocaleString() : value}
                        {target > 0 && <span className="text-xs text-slate-400 font-medium ml-2">/ {target.toLocaleString()}</span>}
                    </h4>
                    {progress !== undefined && (
                        <div className="h-1.5 bg-slate-100 rounded-full overflow-hidden">
                            <div className={`h-full ${barColors[color] || 'bg-slate-400'} transition-all duration-700`} style={{ width: `${Math.min(progress, 100)}%` }} />
                        </div>
                    )}
                </div>
            );
        }

        // --- SALES ENTRY ---
        function SalesCollectionForm({ areaManagers, shops, appId, db, user }) {
            const [formData, setFormData] = useState({ areaManager: '', shopName: '', gaAch: '', ocAch: '', workingHours: '', note: '' });
            const [submitting, setSubmitting] = useState(false);
            const [success, setSuccess] = useState(false);
            const availableShops = useMemo(() => formData.areaManager ? shops.filter(s => s.manager === formData.areaManager) : [], [formData.areaManager, shops]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setSubmitting(true);
                const { collection, addDoc } = window.FirebaseSDK;
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'sales'), { ...formData, gaAch: Number(formData.gaAch), ocAch: Number(formData.ocAch), timestamp: Date.now(), submittedBy: user.uid });
                    setSuccess(true);
                    setFormData({ areaManager: '', shopName: '', gaAch: '', ocAch: '', workingHours: '', note: '' });
                    setTimeout(() => setSuccess(false), 3000);
                } catch (err) { console.error(err); }
                setSubmitting(false);
            };

            return (
                <div className="max-w-2xl mx-auto py-6">
                    <header className="text-center mb-10"><h2 className="text-4xl font-black text-[#0F172A] uppercase tracking-tighter">Daily Entry</h2></header>
                    {success && <div className="bg-emerald-600 text-white p-5 rounded-3xl text-center font-black shadow-2xl mb-6">SUCCESSFULLY SAVED</div>}
                    <form onSubmit={handleSubmit} className="bg-white p-10 rounded-[3rem] border border-slate-200 shadow-2xl space-y-8">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div className="space-y-2">
                                <label className="text-[10px] font-black uppercase text-slate-400">Area Manager</label>
                                <select required className="w-full border-2 border-slate-50 p-5 rounded-2xl bg-slate-50 font-black text-slate-800" value={formData.areaManager} onChange={e => setFormData({...formData, areaManager: e.target.value, shopName: ''})}>
                                    <option value="">Manager</option>
                                    {areaManagers.map(m => <option key={m} value={m}>{m}</option>)}
                                </select>
                            </div>
                            <div className="space-y-2">
                                <label className="text-[10px] font-black uppercase text-slate-400">Cash Shop</label>
                                <select required disabled={!formData.areaManager} className="w-full border-2 border-slate-50 p-5 rounded-2xl bg-slate-50 font-black text-slate-800 disabled:opacity-30" value={formData.shopName} onChange={e => setFormData({...formData, shopName: e.target.value})}>
                                    <option value="">Select Shop</option>
                                    {availableShops.map(s => <option key={s.name} value={s.name}>{s.name}</option>)}
                                </select>
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 pt-4 border-t">
                            <div className="space-y-2">
                                <label className="text-[10px] font-black uppercase text-emerald-500">GA Achievement</label>
                                <input required type="number" className="w-full border-2 border-emerald-50 p-6 rounded-3xl font-black text-4xl text-emerald-600 outline-none" value={formData.gaAch} onChange={e => setFormData({...formData, gaAch: e.target.value})} />
                            </div>
                            <div className="space-y-2">
                                <label className="text-[10px] font-black uppercase text-blue-500">OC Achievement</label>
                                <input required type="number" className="w-full border-2 border-blue-50 p-6 rounded-3xl font-black text-4xl text-blue-600 outline-none" value={formData.ocAch} onChange={e => setFormData({...formData, ocAch: e.target.value})} />
                            </div>
                        </div>
                        <button type="submit" disabled={submitting} className="w-full bg-[#0F172A] text-white py-6 rounded-[2rem] font-black text-2xl hover:bg-black transition-all active:scale-95 disabled:opacity-50">
                            {submitting ? 'SAVING...' : 'SUBMIT SALES DATA'}
                        </button>
                    </form>
                </div>
            );
        }

        // --- ADMIN ---
        function AdminDashboard({ areaManagers, shops, targets, appId, db, user, updateConfig }) {
            const [newManager, setNewManager] = useState('');
            const [newShop, setNewShop] = useState('');
            const [assignManager, setAssignManager] = useState('');
            const [seeding, setSeeding] = useState(false);

            const handleBulkUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const rows = event.target.result.split('\n').slice(1);
                    const newTargets = { ...targets };
                    rows.forEach(row => {
                        const [name, ga, oc] = row.split(',').map(s => s?.trim());
                        if (name && shops.find(s => s.name === name)) {
                            newTargets[name] = { ga: parseFloat(ga) || 0, oc: parseFloat(oc) || 0 };
                        }
                    });
                    updateConfig(areaManagers, shops, newTargets);
                };
                reader.readAsText(file);
            };

            const seedTestData = async () => {
                setSeeding(true);
                const { collection, addDoc } = window.FirebaseSDK;
                const m = ["Alex Carter", "Jordan Lee"];
                const s = [{ name: "Urban Plaza", manager: "Alex Carter" }, { name: "Bayview", manager: "Jordan Lee" }];
                const t = { "Urban Plaza": { ga: 20000, oc: 12000 }, "Bayview": { ga: 15000, oc: 8000 } };
                await updateConfig(m, s, t);
                setSeeding(false);
            };

            return (
                <div className="space-y-8">
                    <header className="flex justify-between items-center">
                        <h2 className="text-2xl font-black">System Controls</h2>
                        <button onClick={seedTestData} disabled={seeding} className="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold flex items-center gap-2">
                            {seeding ? <Loader2 className="animate-spin" size={16}/> : <Database size={16}/>} Seed Data
                        </button>
                    </header>
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="space-y-6">
                            <AdminCard title="Area Managers">
                                <div className="flex gap-2 mb-4">
                                    <input value={newManager} onChange={e => setNewManager(e.target.value)} className="flex-1 border p-2 rounded-lg text-sm" placeholder="Name" />
                                    <button onClick={() => {if(newManager) updateConfig([...areaManagers, newManager], shops, targets); setNewManager('')}} className="bg-slate-900 text-white px-4 rounded-lg font-bold">Add</button>
                                </div>
                                {areaManagers.map((m, i) => <div key={i} className="flex justify-between p-2 bg-slate-50 mb-1 rounded text-sm">{m}</div>)}
                            </AdminCard>
                            <AdminCard title="Shops">
                                <div className="space-y-2 mb-4">
                                    <select value={assignManager} onChange={e => setAssignManager(e.target.value)} className="w-full border p-2 rounded-lg text-sm">
                                        <option value="">Select Manager</option>
                                        {areaManagers.map(m => <option key={m} value={m}>{m}</option>)}
                                    </select>
                                    <div className="flex gap-2">
                                        <input value={newShop} onChange={e => setNewShop(e.target.value)} className="flex-1 border p-2 rounded-lg text-sm" placeholder="Shop Name" />
                                        <button onClick={() => {if(newShop && assignManager) updateConfig(areaManagers, [...shops, {name: newShop, manager: assignManager}], targets); setNewShop('')}} className="bg-slate-900 text-white px-4 rounded-lg font-bold">Add</button>
                                    </div>
                                </div>
                                {shops.map((s, i) => <div key={i} className="p-2 bg-slate-50 mb-1 rounded text-sm"><p className="font-bold">{s.name}</p><p className="text-[10px] text-slate-400 uppercase">MGR: {s.manager}</p></div>)}
                            </AdminCard>
                        </div>
                        <div className="lg:col-span-2 space-y-6">
                            <AdminCard title="Bulk Targets Upload">
                                <div className="p-10 border-2 border-dashed border-emerald-100 bg-emerald-50/50 rounded-2xl text-center relative group">
                                    <input type="file" accept=".csv" onChange={handleBulkUpload} className="absolute inset-0 opacity-0 cursor-pointer" />
                                    <Upload size={32} className="mx-auto text-emerald-500 mb-2 group-hover:scale-110 transition-transform" />
                                    <p className="font-bold text-emerald-900">Click or Drag CSV File</p>
                                    <p className="text-xs text-emerald-600">Template: Shop Name, GA, OC</p>
                                </div>
                            </AdminCard>
                            <AdminCard title="Targets Overview">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-sm">
                                        <thead><tr className="text-slate-400 text-left border-b"><th className="pb-2">Shop</th><th className="pb-2 text-right">GA Target</th><th className="pb-2 text-right">OC Target</th></tr></thead>
                                        <tbody>
                                            {shops.map(s => <tr key={s.name} className="border-b last:border-0"><td className="py-2">{s.name}</td><td className="py-2 text-right font-black">{(targets[s.name]?.ga || 0).toLocaleString()}</td><td className="py-2 text-right font-black">{(targets[s.name]?.oc || 0).toLocaleString()}</td></tr>)}
                                        </tbody>
                                    </table>
                                </div>
                            </AdminCard>
                        </div>
                    </div>
                </div>
            );
        }

        function AdminCard({ title, children }) {
            return <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm"><h3 className="font-bold mb-4 text-slate-800 uppercase tracking-widest text-xs">{title}</h3>{children}</div>;
        }

        // --- REPORTS ---
        function SalesList({ records, targets, shops, managers }) {
            const [filterManager, setFilterManager] = useState('All');
            const [filterShop, setFilterShop] = useState('All');

            const filteredRecords = useMemo(() => {
                let data = [...records];
                if (filterManager !== 'All') data = data.filter(r => r.areaManager === filterManager);
                if (filterShop !== 'All') data = data.filter(r => r.shopName === filterShop);
                return data;
            }, [records, filterManager, filterShop]);

            const monthlyTotals = useMemo(() => {
                const map = {};
                records.filter(r => new Date(r.timestamp).getMonth() === new Date().getMonth()).forEach(r => {
                    if (!map[r.shopName]) map[r.shopName] = { ga: 0, oc: 0 };
                    map[r.shopName].ga += (r.gaAch || 0);
                    map[r.shopName].oc += (r.ocAch || 0);
                });
                return map;
            }, [records]);

            return (
                <div className="space-y-6">
                    <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div><h2 className="text-2xl font-black">Audit Reports</h2><p className="text-slate-500">Full detailed operational logs</p></div>
                        <div className="flex gap-2">
                             <FilterSelect value={filterManager} onChange={e => {setFilterManager(e.target.value); setFilterShop('All')}} options={managers} label="Managers" />
                             <FilterSelect value={filterShop} onChange={e => setFilterShop(e.target.value)} options={shops.filter(s => filterManager === 'All' || s.manager === filterManager).map(s => s.name)} label="Shops" />
                        </div>
                    </header>
                    <div className="bg-white rounded-[2rem] border border-slate-200 overflow-x-auto shadow-sm">
                        <table className="w-full text-left min-w-[1400px]">
                            <thead>
                                <tr className="bg-slate-900 text-slate-400 border-b border-slate-800">
                                    <th className="px-4 py-5 text-[10px] font-black uppercase whitespace-nowrap">Time Stamp</th>
                                    <th className="px-4 py-5 text-[10px] font-black uppercase whitespace-nowrap">Area Manager</th>
                                    <th className="px-4 py-5 text-[10px] font-black uppercase whitespace-nowrap">Date</th>
                                    <th className="px-4 py-5 text-[10px] font-black uppercase whitespace-nowrap">Shop Name</th>
                                    <th className="px-4 py-5 text-[10px] font-black uppercase whitespace-nowrap text-right bg-emerald-900/10">GA Target</th>
                                    <th className="px-4 py-5 text-[10px] font-black uppercase whitespace-nowrap text-right bg-emerald-900/20 text-emerald-400">GA Ach</th>
                                    <th className="px-4 py-5 text-[10px] font-black uppercase whitespace-nowrap text-right bg-emerald-900/10">GA %</th>
                                    <th className="px-4 py-5 text-[10px] font-black uppercase whitespace-nowrap text-right bg-emerald-900/10">Remaining</th>
                                    <th className="px-4 py-5 text-[10px] font-black uppercase whitespace-nowrap text-right bg-blue-900/10">OC Target</th>
                                    <th className="px-4 py-5 text-[10px] font-black uppercase whitespace-nowrap text-right bg-blue-900/20 text-blue-400">OC Ach</th>
                                    <th className="px-4 py-5 text-[10px] font-black uppercase whitespace-nowrap text-right bg-blue-900/10">OC %</th>
                                    <th className="px-4 py-5 text-[10px] font-black uppercase whitespace-nowrap text-right bg-blue-900/10">Remaining</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {filteredRecords.map(r => {
                                    const target = targets[r.shopName] || { ga: 0, oc: 0 };
                                    const totals = monthlyTotals[r.shopName] || { ga: 0, oc: 0 };
                                    const gap = target.ga > 0 ? (totals.ga / target.ga * 100).toFixed(1) : 0;
                                    const ocp = target.oc > 0 ? (totals.oc / target.oc * 100).toFixed(1) : 0;
                                    return (
                                        <tr key={r.id} className="hover:bg-slate-50 transition-colors">
                                            <td className="px-4 py-4 text-xs font-medium text-slate-400 tabular-nums">{new Date(r.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</td>
                                            <td className="px-4 py-4 text-xs font-bold">{r.areaManager}</td>
                                            <td className="px-4 py-4 text-xs text-slate-500">{new Date(r.timestamp).toLocaleDateString()}</td>
                                            <td className="px-4 py-4 text-sm font-black">{r.shopName}</td>
                                            <td className="px-4 py-4 text-right text-xs bg-emerald-50/20">{target.ga.toLocaleString()}</td>
                                            <td className="px-4 py-4 text-right text-sm font-black text-emerald-600 bg-emerald-50/30">+{r.gaAch.toLocaleString()}</td>
                                            <td className="px-4 py-4 text-right text-xs font-black text-emerald-700 bg-emerald-50/20">{gap}%</td>
                                            <td className="px-4 py-4 text-right text-xs bg-emerald-50/20">{Math.max(0, target.ga - totals.ga).toLocaleString()}</td>
                                            <td className="px-4 py-4 text-right text-xs bg-blue-50/20">{target.oc.toLocaleString()}</td>
                                            <td className="px-4 py-4 text-right text-sm font-black text-blue-600 bg-blue-50/30">+{r.ocAch.toLocaleString()}</td>
                                            <td className="px-4 py-4 text-right text-xs font-black text-blue-700 bg-blue-50/20">{ocp}%</td>
                                            <td className="px-4 py-4 text-right text-xs bg-blue-50/20">{Math.max(0, target.oc - totals.oc).toLocaleString()}</td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
